services:
  redis:
    image: redis:alpine
    container_name: redis-server
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass "${REDIS_PASSWORD:?REDIS_PASSWORD not set}" --protected-mode yes
    volumes:
      - ./redis_cache:/data
    networks:
      - npm_network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"${REDIS_PASSWORD}\" ping | grep -q PONG"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

networks:
  npm_network:
    external: true
