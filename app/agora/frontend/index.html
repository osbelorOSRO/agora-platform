<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agora</title>
    
    <!-- FAVICON Y PWA -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico?v=2">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=2">
    <link rel="manifest" href="/manifest.webmanifest">
    
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('theme');
          if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <!--
      Fallback visible ANTES de que React monte.
      React reemplaza el contenido de #root al hidratarse.
      Si main.tsx falla (error de red, CSP, JS deshabilitado) este contenido queda visible.
    -->
    <div id="root">
      <style>
        #app-init-fallback {
          display: flex;
          min-height: 100svh;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          gap: 1.5rem;
          background: #0a0a0a;
          color: #e5e5e5;
          font-family: system-ui, sans-serif;
          padding: 2rem;
          text-align: center;
        }
        #app-init-fallback h1 { font-size: 1.25rem; font-weight: 700; color: #fff; }
        #app-init-fallback p  { font-size: 0.875rem; color: #737373; max-width: 24rem; }
        #app-init-fallback a  {
          display: inline-block;
          margin-top: 0.5rem;
          padding: 0.5rem 1.5rem;
          border: 1px solid #3f3f3f;
          border-radius: 0.75rem;
          font-size: 0.875rem;
          color: #e5e5e5;
          text-decoration: none;
          transition: border-color 0.2s;
        }
        #app-init-fallback a:hover { border-color: #994d15; color: #f97316; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .init-spinner {
          width: 2rem; height: 2rem;
          border: 2px solid #3f3f3f;
          border-top-color: #994d15;
          border-radius: 50%;
          animation: spin 0.8s linear infinite;
        }
      </style>
      <div id="app-init-fallback">
        <div class="init-spinner"></div>
        <div>
          <h1>Iniciando Agora…</h1>
          <p>Si esta pantalla no desaparece, puede haber un problema de conexión.</p>
          <a href="javascript:location.reload()">Recargar página</a>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
