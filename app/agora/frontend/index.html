<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agora</title>
    
    <!-- FAVICON Y PWA -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico?v=2">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="manifest" href="/manifest.webmanifest">
    
    <script>
      (function() {
        // En dispositivos touch con DPR nativo = 4, el tile cache GPU desborda
        // generando glitches de renderizado en scroll. CSS zoom aplicado al
        // elemento html opera al nivel de rendering CSS — independiente del zoom
        // configurado en el navegador — y reduce la presión de compositor a ~DPR 3.56.
        // Threshold 3.9: captura DPR=4 al 100% de zoom del browser (reporta 4.0),
        // sin activarse cuando el usuario ya bajó el zoom manualmente (reporta ~3.56).
        try {
          if (
            window.devicePixelRatio >= 3.9 &&
            ('ontouchstart' in window || navigator.maxTouchPoints > 0)
          ) {
            document.documentElement.style.zoom = '0.89';
          }
        } catch (e) {}

        try {
          var theme = localStorage.getItem('theme');
          if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
