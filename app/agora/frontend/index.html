<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agora</title>
    
    <!-- FAVICON Y PWA -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico?v=2">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="manifest" href="/manifest.webmanifest">
    
    <script>
      (function() {
        // En dispositivos touch con DPR >= 3.5 (típicamente DPR=4 en Android gama alta),
        // el browser genera compositor layers extras que producen glitch de renderizado.
        // Reducir initial-scale a 0.89 replica el fix manual de bajar zoom al 89%,
        // aplicado antes del primer layout para evitar reflow visible.
        try {
          if (
            window.devicePixelRatio >= 3.5 &&
            ('ontouchstart' in window || navigator.maxTouchPoints > 0)
          ) {
            var vp = document.querySelector('meta[name="viewport"]');
            if (vp) {
              vp.setAttribute('content', 'width=device-width, initial-scale=0.89');
            }
          }
        } catch (e) {}

        try {
          var theme = localStorage.getItem('theme');
          if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
