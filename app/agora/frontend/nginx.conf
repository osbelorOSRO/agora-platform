server {
    listen 80;
    server_name localhost;
    server_tokens off;
    root /usr/share/nginx/html;
    index index.html;

    add_header Content-Security-Policy "default-src 'self'; script-src ${FRONTEND_CSP_SCRIPT_SRC}; style-src ${FRONTEND_CSP_STYLE_SRC}; font-src ${FRONTEND_CSP_FONT_SRC}; connect-src ${FRONTEND_CSP_CONNECT_SRC}; img-src ${FRONTEND_CSP_IMG_SRC}; media-src ${FRONTEND_CSP_MEDIA_SRC}; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self';" always;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(self), camera=()" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /robots.txt {
        default_type text/plain;
        try_files /robots.txt =404;
        add_header Content-Security-Policy "default-src 'self'; script-src ${FRONTEND_CSP_SCRIPT_SRC}; style-src ${FRONTEND_CSP_STYLE_SRC}; font-src ${FRONTEND_CSP_FONT_SRC}; connect-src ${FRONTEND_CSP_CONNECT_SRC}; img-src ${FRONTEND_CSP_IMG_SRC}; media-src ${FRONTEND_CSP_MEDIA_SRC}; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self';" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(self), camera=()" always;
        add_header Cache-Control "public, max-age=3600" always;
    }

    location = /manifest.webmanifest {
        types {
            application/manifest+json webmanifest;
        }
        try_files /manifest.webmanifest =404;
        add_header Content-Security-Policy "default-src 'self'; script-src ${FRONTEND_CSP_SCRIPT_SRC}; style-src ${FRONTEND_CSP_STYLE_SRC}; font-src ${FRONTEND_CSP_FONT_SRC}; connect-src ${FRONTEND_CSP_CONNECT_SRC}; img-src ${FRONTEND_CSP_IMG_SRC}; media-src ${FRONTEND_CSP_MEDIA_SRC}; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self';" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(self), camera=()" always;
        add_header Cache-Control "public, max-age=3600" always;
    }

    location ~* \.map$ {
        return 404;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|mp3)$ {
        expires 1y;
        add_header Content-Security-Policy "default-src 'self'; script-src ${FRONTEND_CSP_SCRIPT_SRC}; style-src ${FRONTEND_CSP_STYLE_SRC}; font-src ${FRONTEND_CSP_FONT_SRC}; connect-src ${FRONTEND_CSP_CONNECT_SRC}; img-src ${FRONTEND_CSP_IMG_SRC}; media-src ${FRONTEND_CSP_MEDIA_SRC}; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self';" always;
        add_header Cache-Control "public, immutable" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(self), camera=()" always;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
