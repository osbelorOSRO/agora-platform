services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_WEBSOCKET_URL: "${WS_PUBLIC_URL}"
        VITE_API_URL: "${API_PUBLIC_URL}"
        VITE_MEDIA_BASE_URL: "${MEDIA_BASE_URL}"
        VITE_AUTH_API_URL: "${API_PUBLIC_URL}/api/auth"
        VITE_ESTADO_BOT_URL: "${SOCKET_HTTP_PUBLIC_URL}"
        VITE_API_URL_ACCESOS: "${API_PUBLIC_URL}"
        VITE_WA_PUBLIC_URL: "${WA_PUBLIC_URL}"
    container_name: panel_frontend
    restart: always
    ports:
      - "${HOST_BIND_IP:-127.0.0.1}:5173:80"
    networks:
      - npm_network
    working_dir: /app
    environment:
      FRONTEND_CSP_SCRIPT_SRC: "${FRONTEND_CSP_SCRIPT_SRC:-'self' 'unsafe-inline'}"
      FRONTEND_CSP_STYLE_SRC: "${FRONTEND_CSP_STYLE_SRC:-'self' 'unsafe-inline' https://fonts.googleapis.com}"
      FRONTEND_CSP_FONT_SRC: "${FRONTEND_CSP_FONT_SRC:-'self' https://fonts.gstatic.com}"
      FRONTEND_CSP_CONNECT_SRC: "${FRONTEND_CSP_CONNECT_SRC:-'self' ${API_PUBLIC_URL} ${WS_PUBLIC_URL} ${WA_PUBLIC_URL} ${WA_WS_PUBLIC_URL:-} ${N8N_PUBLIC_URL}}"
      FRONTEND_CSP_IMG_SRC: "${FRONTEND_CSP_IMG_SRC:-'self' data: blob: ${MEDIA_BASE_URL} https://facebook.com https://www.facebook.com https://*.facebook.com https://fbcdn.net https://*.fbcdn.net https://pps.whatsapp.net https://lookaside.fbsbx.com}"
      FRONTEND_CSP_MEDIA_SRC: "${FRONTEND_CSP_MEDIA_SRC:-'self' data: blob: ${MEDIA_BASE_URL}}"

  websocket:
    build:
      context: ./websocket
      dockerfile: Dockerfile
    container_name: panel_websocket
    restart: always
    ports:
      - "${HOST_BIND_IP:-127.0.0.1}:5050:5050"
    networks:
      - npm_network
    env_file:
      - ./websocket/.env
    environment:
      - NODE_ENV=production
      - CORS_ALLOWED_ORIGINS=${FRONTEND_PUBLIC_URL},${API_PUBLIC_URL}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5050/estado-bot >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: ./api-backend-nest
      dockerfile: Dockerfile.alpine
    container_name: backend
    restart: unless-stopped
    ports:
      - "${HOST_BIND_IP:-127.0.0.1}:4001:4001"
    networks:
      - npm_network
    volumes:
      - ./config:/app/config
    env_file:
      - ./api-backend-nest/.env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${API_DATABASE_URL}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - MEDIA_BASE_URL=${MEDIA_BASE_URL}
      - CORS_ALLOWED_ORIGINS=${FRONTEND_PUBLIC_URL}
      - WS_SERVER=${WS_INTERNAL_URL}
      - BOT_BASE_URL=${WA_INTERNAL_URL}
      - BAILEYS_INTERNAL_TOKEN=${BAILEYS_INTERNAL_TOKEN}
      - FCA_INTERNAL_TOKEN=${FCA_INTERNAL_TOKEN}
      - FCA_CONFIG_ENCRYPTION_KEY=${FCA_CONFIG_ENCRYPTION_KEY}
      - FCA_BACKEND_URL=http://fb-backend:3001
      - N8N_MSG_DELEGATION_WEBHOOK_URL=${N8N_INTERNAL_URL}/webhook/flujo-eventos
      - N8N_THREAD_MSG_DELEGATION_WEBHOOK_URL=${N8N_INTERNAL_URL}/webhook/meta-thread-messages-delegation
      - VAULT_ADDR=${VAULT_ADDR}
      - VAULT_APP_SECRETS_PATH=${API_VAULT_APP_SECRETS_PATH:-dev.local1/agora/api-backend-nest}
      - GATEWAY_BASE_URL=${GATEWAY_BASE_URL:-https://gateway.example.com}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT}
      - MINIO_PORT=${MINIO_PORT:-9000}
      - MINIO_USE_SSL=${MINIO_USE_SSL:-false}
      - MINIO_BUCKET=${MINIO_BUCKET:-agora-media}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - OTEL_ENABLED=${OTEL_ENABLED:-false}
      - OTEL_SERVICE_NAME=api-backend-nest
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318/v1/traces}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4001/ping/db >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 25s

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.118.0
    container_name: otel-collector
    restart: unless-stopped
    volumes:
      - ./config/otel-collector.yml:/etc/otel/config.yml
    command: ["--config=/etc/otel/config.yml"]
    environment:
      - OTEL_SAMPLING_PERCENTAGE=${OTEL_SAMPLING_PERCENTAGE:-100}
    networks:
      - npm_network
    depends_on:
      - jaeger

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    restart: unless-stopped
    environment:
      SPAN_STORAGE_TYPE: badger
      # Dev: JAEGER_BADGER_EPHEMERAL=true (memoria, sin volumen)
      # Prod: JAEGER_BADGER_EPHEMERAL=false (volumen persistente; ver runbook permisos)
      BADGER_EPHEMERAL: "${JAEGER_BADGER_EPHEMERAL:-true}"
      BADGER_DIRECTORY_VALUE: /badger/data
      BADGER_DIRECTORY_KEY: /badger/key
    volumes:
      - jaeger_badger:/badger
    ports:
      - "${HOST_BIND_IP:-127.0.0.1}:16686:16686"   # UI — solo red Tailscale
    networks:
      - npm_network

  fb-backend:
    build:
      context: ../fb-backend
      dockerfile: Dockerfile
    container_name: fb-backend
    restart: unless-stopped
    ports:
      - "${HOST_BIND_IP:-127.0.0.1}:3001:3001"
    networks:
      - npm_network
    environment:
      - PORT=3001
      - NESTJS_INTERNAL_URL=http://backend:4001
      - FCA_INTERNAL_TOKEN=${FCA_INTERNAL_TOKEN}
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

networks:
  npm_network:
    external: true

volumes:
  jaeger_badger:

