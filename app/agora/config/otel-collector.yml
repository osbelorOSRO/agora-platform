receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
  probabilistic_sampler:
    # Dev: OTEL_SAMPLING_PERCENTAGE=100 (en dev.local1.secrets.env)
    # Prod: OTEL_SAMPLING_PERCENTAGE=20  (en prod.vps1.secrets.env)
    # Docker Compose resuelve el default antes de pasar la var al contenedor
    sampling_percentage: ${OTEL_SAMPLING_PERCENTAGE}

exporters:
  otlp:
    endpoint: jaeger:4317
    tls:
      insecure: true

service:
  telemetry:
    logs:
      level: error
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch, probabilistic_sampler]
      exporters: [otlp]
