name: CI / CD — Agora

on:
  push:
    branches: [main]
    paths:
      - 'app/agora/**'
      - 'app/fb-backend/**'
      - '.github/workflows/ci-cd-agora.yml'
  pull_request:
    branches: [main]
    paths:
      - 'app/agora/**'
      - 'app/fb-backend/**'
      - '.github/workflows/ci-cd-agora.yml'

jobs:
  ci:
    name: Lint, Test y Build
    runs-on: self-hosted
    env:
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
    defaults:
      run:
        working-directory: app/agora/api-backend-nest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: app/agora/api-backend-nest/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Generar cliente Prisma
        run: npx prisma generate

      - name: Lint
        run: npx eslint "{src,test}/**/*.ts" --max-warnings 0

      - name: Tests
        run: npm test

      - name: Iniciar Postgres CI
        run: |
          docker run -d --name pg_ci \
            -e POSTGRES_USER=ci \
            -e POSTGRES_PASSWORD=ci \
            -e POSTGRES_DB=ci \
            -p 5432:5432 \
            postgres:15-alpine
          for i in $(seq 1 30); do
            docker exec pg_ci pg_isready -U ci && break
            sleep 1
          done

      - name: Aplicar schema en CI DB
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"

      - name: Tests E2E
        run: npm run test:e2e
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"

      - name: Detener Postgres CI
        if: always()
        run: docker rm -f pg_ci || true

      - name: Build
        run: npm run build

  deploy:
    name: Deploy → prod.vps1
    needs: ci
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Pull y build
        env:
          PROD_DIR: /home/deploy/agora-platform
          ENV_FILE: /home/deploy/agora-platform/app/env/prod.vps1.secrets.env
        run: |
          cd "$PROD_DIR"
          git fetch origin main
          git reset --hard origin/main
          docker compose -p stack_agora \
            --env-file "$ENV_FILE" \
            -f app/agora/docker-compose.yml \
            build backend frontend fb-backend

      - name: Aplicar migraciones DB
        env:
          PROD_DIR: /home/deploy/agora-platform
          ENV_FILE: /home/deploy/agora-platform/app/env/prod.vps1.secrets.env
        run: |
          cd "$PROD_DIR"
          docker compose -p stack_agora \
            --env-file "$ENV_FILE" \
            -f app/agora/docker-compose.yml \
            run --rm --no-deps backend \
            sh -c "npx prisma migrate deploy"

      - name: Restart stack_agora
        env:
          PROD_DIR: /home/deploy/agora-platform
          ENV_FILE: /home/deploy/agora-platform/app/env/prod.vps1.secrets.env
        run: |
          cd "$PROD_DIR"
          docker compose -p stack_agora \
            --env-file "$ENV_FILE" \
            -f app/agora/docker-compose.yml \
            up -d --no-build --force-recreate frontend backend websocket fb-backend
