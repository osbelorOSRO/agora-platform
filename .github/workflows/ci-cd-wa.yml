name: CI / CD — WA Backend

on:
  push:
    branches: [main]
    paths:
      - 'app/wa-backend/**'

jobs:
  deploy:
    name: Deploy → prod.vps1
    runs-on: self-hosted

    steps:
      - name: Rebuild stack_wabackend
        env:
          PROD_DIR: /home/deploy/agora-platform
          ENV_FILE: /home/deploy/agora-platform/app/env/prod.vps1.secrets.env
        run: |
          cd "$PROD_DIR"
          git pull origin main
          docker compose -p stack_wabackend \
            --env-file "$ENV_FILE" \
            -f app/wa-backend/docker-compose.yml \
            up -d --build --force-recreate
