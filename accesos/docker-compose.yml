services:
  abackend:
    build:
      context: ./abackend
      dockerfile: Dockerfile
    container_name: abackend
    restart: always
    ports:
      - "${HOST_BIND_IP:-100.121.39.83}:4002:4002"
    networks:
      - npm_network
    env_file:
      - ./abackend/.env
    environment:
      - DATABASE_URL=${ABACKEND_DATABASE_URL}
      - CORS_ALLOWED_ORIGINS=${FRONTEND_PUBLIC_URL}
      - SERVICE_ALLOWED_IPS=${SERVICE_ALLOWED_IPS:-100.121.165.88,100.67.8.81,100.101.61.94,127.0.0.1}
    volumes:
      - ./abackend/prisma:/app/prisma
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4002/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

networks:
  npm_network:
    external: true
